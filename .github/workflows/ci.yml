name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app bundles
        run: node build.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E and visual regression tests
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # Electron builds only run on release.yml (tag push or manual dispatch).
  # CI validates tests + bundle build only — no cross-platform Electron packaging.
